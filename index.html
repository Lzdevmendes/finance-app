
    <!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Aplicação completa de organização financeira pessoal" />
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Finanças Pro" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Finanças Pro</title>

    <script>
      // Aplica tema antes do React carregar (evita flash). As cores vivem em CSS:
      // o modo é a classe .dark e o accent é o atributo data-accent no <html>.
      (function () {
        try {
          var prefs = JSON.parse(localStorage.getItem('finance-app-preferences') || '{}');
          var theme = prefs.theme || 'emerald';
          var darkMode = prefs.darkMode || false;
          var root = document.documentElement;
          root.classList.toggle('dark', darkMode);
          root.setAttribute('data-accent', theme);
          window.__THEME_DATA__ = { theme: theme, darkMode: darkMode };
        } catch (error) {
          console.warn('Theme initialization failed:', error);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
